spring.application.name=back
spring.config.import=optional:classpath:application-local.properties

spring.datasource.url=jdbc:mysql://localhost:3306/ok_db?useSSL=false&serverTimezone=Africa/Tunis&characterEncoding=UTF-8&useUnicode=true&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jmx.enabled=false

spring.jpa.properties.hibernate.connection.CharSet=utf8mb4
spring.jpa.properties.hibernate.connection.characterEncoding=utf8mb4
spring.jpa.properties.hibernate.connection.useUnicode=true

jwt.secret=${JWT_SECRET}
jwt.expiration=604800000

server.port=8080
server.address=0.0.0.0

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
spring.jpa.open-in-view=false
logging.level.org.springframework.beans.factory=WARN
logging.level.org.springframework.context.annotation=WARN
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=hrabisalma9@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

ocr.service.url=http://localhost:8000/ocr
app.upload-dir=uploads

hf.auto.enabled=true
hf.auto.import.enabled=true
hf.auto.fallback-wiki=true
hf.auto.import.timeout-sec=90
hf.cache.enabled=true
hf.cache.key-version=v5

suspicion.service.url=http://localhost:8001/analyze
suspicion.service.enabled=true

# Suspicion notifications (local only)
suspicion.notify.fastSec=120
suspicion.notify.criticalSec=60
suspicion.notify.repeat.windowDays=7
suspicion.notify.repeat.count=3
suspicion.score.suspectMin=40
suspicion.score.verySuspectMin=80
pdf.extractor.url=http://localhost:8002/extract-pdf



# ─── LibreTranslate (Docker local) ───────────────────────────────────────────
# URL de ton instance LibreTranslate Docker
libretranslate.url=http://localhost:5000
# Clé API (laisser vide si pas de --api-keys dans Docker)
libretranslate.api-key=
# Activer/désactiver la traduction automatique à l'import PDF
libretranslate.import.enabled=true
